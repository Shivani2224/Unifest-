<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - UNIFEST</title>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <div class="auth-page">
        <div class="orb orb1"></div>
        <div class="orb orb2"></div>

        <div class="auth-card glass-strong fade-up">
            <div class="auth-head-wide">
                <div class="icon-badge-lg">
                    <i data-lucide="graduation-cap" style="width:28px;height:28px"></i>
                </div>
                <h1 class="auth-title">College Event Hub</h1>
                <p class="auth-sub">Sign in to continue</p>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="field">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" placeholder="you@college.edu" required>
                </div>
                <div class="field-wide">
                    <label for="login-pass">Password</label>
                    <input type="password" id="login-pass" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="loginBtn">Sign In</button>
            </form>

            <p class="auth-footer">
                Don't have an account? <a href="register.html">Register</a>
            </p>
        </div>
        <div class="toast-container" id="toasts"></div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script>
        lucide.createIcons();
        if (localStorage.getItem('user')) {
             const user = JSON.parse(localStorage.getItem('user'));
             window.location.href = user.role === 'admin' ? 'admin-dashboard.html' : 'student-dashboard.html';
        }
    </script>
</body>
</html>
