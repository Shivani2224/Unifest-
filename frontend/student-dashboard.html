<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - UNIFEST</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="h-full" style="background:var(--bg1);color:var(--text)">
    <div id="app" class="h-full w-full relative overflow-hidden flex flex-col">
        <header class="flex items-center justify-between px-6 py-4 border-b relative z-20" style="border-color:var(--glass-border);background:rgba(0,0,0,0.2);backdrop-filter:blur(10px)">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-violet-600 to-indigo-600 flex items-center justify-center">
                    <i data-lucide="graduation-cap" style="width:18px;height:18px;color:#fff"></i>
                </div>
                <span class="font-bold text-lg">College Event Hub</span>
            </div>
            <div class="flex items-center gap-3">
                <span class="text-sm hidden sm:inline" style="color:var(--text-dim)" id="student-name-display"></span>
                <button class="btn btn-ghost text-xs" onclick="logout()">
                    <i data-lucide="log-out" style="width:14px;height:14px"></i> Logout
                </button>
            </div>
        </header>

        <div class="flex flex-1 overflow-hidden relative z-10">
            <nav class="w-20 md:w-56 p-4 border-r" style="border-color:var(--glass-border);background:rgba(0,0,0,0.1);backdrop-filter:blur(5px)">
                <div class="nav-item active mb-2" onclick="switchStudentTab('explore',this)">
                    <i data-lucide="compass" style="width:18px;height:18px"></i> <span class="hidden md:inline">Explore Events</span>
                </div>
                <div class="nav-item" onclick="switchStudentTab('myregs',this)">
                    <i data-lucide="ticket" style="width:18px;height:18px"></i> <span class="hidden md:inline">My Registrations</span>
                </div>
            </nav>
            <main class="flex-1 overflow-auto p-6" id="student-content"></main>
        </div>

        <div class="orb orb1" style="z-index: 0;"></div>
        <div class="orb orb2" style="z-index: 0;"></div>
        <div class="toast-container" id="toasts"></div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/student.js"></script>
    <script>
        initStudent();
    </script>
</body>
</html>
