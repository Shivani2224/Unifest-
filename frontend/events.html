<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Events | UNIFEST</title>
  <link rel="stylesheet" href="css/events.css">
</head>
<body>

<div class="overlay"></div>

<header class="navbar">
  <div class="brand">
    <span class="logo"><img src="images/logo.png" alt=""></span>
    <span class="name">UNIFEST</span>
  </div>
  <nav>
    <a href="index.html">Home</a>
    <a href="#" class="active">Events</a>
    <a href="about.html">About Us</a>

    <a id="loginLink" href="login.html" class="login-btn">Login</a>
    <a id="logoutLink" href="#" class="login-btn" style="display:none;" onclick="logout(); return false;">Logout</a>
  </nav>
</header>

<section class="hero">
  <h1>Explore <span>Events</span></h1>
  <p>Browse and discover upcoming college events.</p>
</section>

<section class="events-container">

  <div class="event-card" onclick="openEvent('Tech Fest 2026','Auditorium','12 Feb 2026','10:00 AM','images/event.png')">
    <img src="images/event.png" alt="Tech Fest 2026">
    <div class="event-info">
      <h3>Tech Fest 2026</h3>
      <p>📍 Auditorium</p>
      <p>📅 12 Feb 2026</p>
      <p>⏰ 10:00 AM</p>
    </div>
  </div>

  <div class="event-card" onclick="openEvent('Music night','open ground','15 Feb 2026','7:00 PM','images/event.png')">
    <img src="images/event.png" alt="Music night 2026">
    <div class="event-info">
      <h3>Music night 2026</h3>
      <p>📍 open ground</p>
      <p>📅 15 Feb 2026</p>
      <p>⏰ 7:00 PM</p>
    </div>
  </div>

  <div class="event-card" onclick="openEvent('Big Fest 2026','Hall gt','16 Feb 2026','11:00 AM','images/event.png')">
    <img src="images/event.png" alt="Big Fest 2026">
    <div class="event-info">
      <h3>Big Fest 2026</h3>
      <p>📍 Hall gt</p>
      <p>📅 16 Feb 2026</p>
      <p>⏰ 11:00 AM</p>
    </div>
  </div>

</section>

<script src="js/events.js"></script>
</body>
</html>
