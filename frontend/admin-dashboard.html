<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - UNIFEST</title>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <div id="app" class="app-shell">
        <header class="app-header">
            <div class="app-header-group">
                <div class="icon-badge">
                    <i data-lucide="shield" style="width:18px;height:18px"></i>
                </div>
                <span class="app-title">Admin Dashboard</span>
            </div>
            <div class="app-header-group">
                <span class="app-username" id="admin-name-display"></span>
                <button class="btn btn-ghost btn-xs" onclick="logout()">
                    <i data-lucide="log-out" style="width:14px;height:14px"></i> Logout
                </button>
            </div>
        </header>

        <div class="app-body">
            <nav class="app-sidebar">
                <div class="nav-item active" onclick="switchAdminTab('stats',this)">
                    <i data-lucide="bar-chart-3" style="width:18px;height:18px"></i> <span class="nav-label">Overview</span>
                </div>
                <div class="nav-item" onclick="switchAdminTab('create',this)">
                    <i data-lucide="plus-circle" style="width:18px;height:18px"></i> <span class="nav-label">Create Event</span>
                </div>
                <div class="nav-item" onclick="switchAdminTab('events',this)">
                    <i data-lucide="calendar" style="width:18px;height:18px"></i> <span class="nav-label">All Events</span>
                </div>
                <div class="nav-item" onclick="switchAdminTab('regs',this)">
                    <i data-lucide="users" style="width:18px;height:18px"></i> <span class="nav-label">Registrations</span>
                </div>
            </nav>
            <main class="app-main" id="admin-content"></main>
        </div>

        <div class="orb orb1"></div>
        <div class="orb orb2"></div>
        <div class="toast-container" id="toasts"></div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/admin.js"></script>
    <script>
        initAdmin();
    </script>
</body>
</html>
