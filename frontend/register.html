<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - UNIFEST</title>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <div class="auth-page">
        <div class="orb orb1"></div>
        <div class="orb orb2"></div>

        <div class="auth-card glass-strong fade-up">
            <div class="auth-head">
                <h1 class="auth-title">Create Account</h1>
                <p class="auth-sub">Join the campus community</p>
            </div>

            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="field-tight">
                    <label for="reg-name">Full Name</label>
                    <input type="text" id="reg-name" placeholder="John Doe" required>
                </div>
                <div class="field-tight">
                    <label for="reg-email">Email</label>
                    <input type="email" id="reg-email" placeholder="you@college.edu" required>
                </div>
                <div class="field-tight">
                    <label for="reg-pass">Password</label>
                    <input type="password" id="reg-pass" placeholder="Min 6 characters" required minlength="6">
                </div>
                <div class="field-row">
                    <div>
                        <label for="reg-dept">Department</label>
                        <select id="reg-dept" required>
                            <option value="">Select</option>
                            <option>Computer Science</option>
                            <option>Electronics</option>
                            <option>Mechanical</option>
                            <option>Civil</option>
                            <option>Business</option>
                            <option>Arts</option>
                        </select>
                    </div>
                    <div>
                        <label for="reg-year">Year</label>
                        <select id="reg-year" required>
                            <option value="">Select</option>
                            <option>1st Year</option>
                            <option>2nd Year</option>
                            <option>3rd Year</option>
                            <option>4th Year</option>
                        </select>
                    </div>
                </div>
                <div class="field-wide">
                    <label for="reg-role">Role</label>
                    <select id="reg-role" required>
                        <option value="student">Student</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="regBtn">Create Account</button>
            </form>

            <p class="auth-footer">
                Already registered? <a href="login.html">Sign In</a>
            </p>
        </div>
        <div class="toast-container" id="toasts"></div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
